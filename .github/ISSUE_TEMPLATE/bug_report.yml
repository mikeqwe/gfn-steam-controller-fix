name: Bug report
description: Report a reproducible build, verification, or controller-input problem.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not attach GFN/Steam binaries or unsanitized logs. Remove user IDs,
        device IDs, session IDs, tokens, and account details from excerpts.

  - type: input
    id: gfn-version
    attributes:
      label: GeForce NOW version
      placeholder: 2.0.87.130
    validations:
      required: true

  - type: input
    id: macos-version
    attributes:
      label: macOS version and build
      placeholder: 26.5.2
    validations:
      required: true

  - type: dropdown
    id: architecture
    attributes:
      label: Architecture
      options:
        - Apple Silicon arm64
        - Rosetta x86_64
        - Intel x86_64
    validations:
      required: true

  - type: textarea
    id: controller
    attributes:
      label: Controller and HID identity
      description: Include physical and virtual VID:PID values when available.
      placeholder: Steam Controller 28de:1304; GamePad-1 045e:028e
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Distinguish GFN interface behavior from streamed-game behavior.
    validations:
      required: true

  - type: textarea
    id: haptics
    attributes:
      label: Haptics result
      description: State whether vibration was tested, worked, or was not applicable.

  - type: textarea
    id: command-output
    attributes:
      label: Sanitized build or verify output
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I ran `make check` on the repository revision used.
          required: true
        - label: I removed private identifiers and did not attach proprietary binaries.
          required: true
